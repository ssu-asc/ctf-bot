name: Schedule Notify

on:
  schedule:
    - cron: "0 0 * * *"  # 매일 UTC 00:00 (KST 09:00)
  workflow_dispatch:
    inputs:
      test:
        description: "테스트 모드 (가장 가까운 일정 1건 알림)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run schedule notification
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          DISCORD_SCHEDULE_WEBHOOK_URL: ${{ secrets.DISCORD_SCHEDULE_WEBHOOK_URL }}
        working-directory: scripts
        run: python notify_schedule.py ${{ github.event.inputs.test == 'true' && '--test' || '' }}

      - name: Commit state changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/schedule_notified.json
          git diff --staged --quiet || git commit -m "chore: update schedule notified state"
          git push
